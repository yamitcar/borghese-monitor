name: Borghese ticket monitor

on:
  schedule:
    - cron: "0 */3 * * *"   # cada 3 horas (UTC)
  workflow_dispatch:
  push:
    # correr también cuando cambie el monitor, para validar selectores tras cada ajuste
    paths:
      - ".github/workflows/monitor.yml"
      - "scripts/check_borghese.py"

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright + Chromium
        run: |
          python -m pip install --quiet playwright
          python -m playwright install --with-deps chromium

      - name: Run availability check
        id: check
        run: |
          set -o pipefail
          python scripts/check_borghese.py | tee check_output.txt
          # OJO: "NOT_AVAILABLE" contiene "AVAILABLE" como subcadena,
          # por eso el match es de línea exacta.
          if grep -qx 'AVAILABLE' check_output.txt; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open alert issue
        if: steps.check.outputs.available == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const title = '🎟️ POSIBLE disponibilidad Galleria Borghese — 25 sep tarde';
            // no spamear: si ya hay un issue abierto con este título, comentar en vez de crear
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            let body = 'No se pudo leer availability_details.txt — revisa los logs del workflow.';
            try { body = fs.readFileSync('availability_details.txt', 'utf8'); } catch (e) {}
            body += `\n\n---\n_Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}_`;
            const existing = open.data.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: 'Sigue detectándose disponibilidad:\n\n' + body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
